[client]
showErrorDetails = false
toolbarMode = "minimal"

[logger]
level = "warning"

[server]
headless = true
port = 8501
enableXsrfProtection = true
enableCORS = false
maxUploadSize = 200

[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
